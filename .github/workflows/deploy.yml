name: Build and Deploy 9ja News

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get repo code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies (if any)
      - name: Install dependencies
        run: npm install || true

      # 4. Build site
      - name: Build site
        run: node build.js

      # 5. Upload dist folder as artifact (for Netlify or download)
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: dist
