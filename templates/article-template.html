<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO TITLE -->
    <title>__TITLE__</title>

    <!-- BASIC SEO -->
    <meta name="description" content="__DESCRIPTION__">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <link rel="canonical" href="__CANONICAL_URL__">

    <!-- OPEN GRAPH -->
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="9ja News">
    <meta property="og:title" content="__TITLE__">
    <meta property="og:description" content="__DESCRIPTION__">
    <meta property="og:url" content="__CANONICAL_URL__">
    <meta property="og:image" content="__IMAGE_URL__">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="675">

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="__TITLE__">
    <meta name="twitter:description" content="__DESCRIPTION__">
    <meta name="twitter:image" content="__IMAGE_URL__">

    <!-- STRUCTURED DATA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "__CANONICAL_URL__"
      },
      "headline": "__TITLE__",
      "image": ["__IMAGE_URL__"],
      "datePublished": "__DATE_PUBLISHED__",
      "dateModified": "__DATE_MODIFIED__",
      "author": {
        "@type": "Person",
        "name": "Ifeanyi Clement Okoye",
        "url": "https://blog.pluse.name.ng/authors/ifeanyi-okoye"
      },
      "publisher": {
        "@type": "Organization",
        "name": "9ja News",
        "logo": {
          "@type": "ImageObject",
          "url": "https://blog.pluse.name.ng/logo.png"
        }
      },
      "description": "__DESCRIPTION__"
    }
    </script>

    <!-- CSS (FIXED PATH) -->
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<!-- HEADER -->
<header class="header">
    <a href="index.html" class="header-title">9ja News</a>
</header>

<!-- PAGE WRAPPER -->
<main class="page-wrapper">
    <div class="content-container">

        <article class="article-card">

            <!-- TITLE -->
            <h1 class="main-article-title">__TITLE__</h1>

            <!-- META -->
            <div class="main-article-meta">
                By Ifeanyi Clement Okoye • __DISPLAY_DATE__
            </div>

            <!-- FEATURE IMAGE -->
            <div class="featured-image-container">
                <img src="__IMAGE_URL__" alt="__TITLE__" class="featured-image" loading="eager">
            </div>

            <!-- INTRO -->
            <p class="article-snippet">
                __INTRO_PARAGRAPH__
            </p>

            <!-- CONTENT -->
            <div class="article-body">
                __CONTENT__
            </div>

            <!-- RELATED -->
            <div class="sub-card">
                <div class="sub-card-header">Related Articles</div>

                <a href="__RELATED_1__">Related Article</a><br>
                <a href="__RELATED_2__">Related Article</a>
            </div>

        </article>

    </div>
</main>

<!-- JS (FIXED PATH) -->
<script src="assets/js/script.js"></script>

</body>
</html>
