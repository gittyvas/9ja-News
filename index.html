<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9ja News | Latest Updates</title>
    
    <!-- Base CSS for Layout & Styling -->
    <style>
        :root { 
            --9ja-green: #4CAF50; 
            --text-dark: #222;
            --bg-light: #f9f9f9;
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--bg-light); 
            color: var(--text-dark);
        }

        /* Header & Search */
        header { 
            background: var(--9ja-green); 
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .header-logo { 
            font-size: 24px; 
            font-weight: 900; 
            color: white; 
            text-decoration: none; 
        }
        .search-wrapper {
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        #search-input {
            display: none; 
            padding: 8px 15px; 
            border: none; 
            border-radius: 20px; 
            outline: none; 
            font-family: inherit;
            width: 150px;
            transition: all 0.3s ease;
        }
        .header-icon { font-size: 20px; cursor: pointer; }

        /* Ticker */
        .trending-bar { 
            background: #fff; 
            border-bottom: 1px solid #ddd; 
            padding: 10px; 
            font-size: 14px; 
            font-weight: bold; 
        }

        /* Main Container */
        main { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            background: #fff; 
            min-height: 100vh;
        }

        /* Ads */
        .ad-container { 
            background: #eee; 
            text-align: center; 
            padding: 20px; 
            margin-bottom: 20px; 
            color: #999; 
            font-size: 12px; 
            border: 1px dashed #ccc;
        }

        /* Hero Article */
        .hero { margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .hero img { width: 100%; height: auto; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; }
        .hero h1 { font-size: 28px; font-weight: 900; margin: 15px 0 5px 0; line-height: 1.2; }

        /* News Feeds */
        section { margin-top: 30px; }
        h2 { font-size: 20px; border-left: 4px solid var(--9ja-green); padding-left: 10px; margin-bottom: 15px; }
        
        .news-card { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            align-items: center; 
        }
        .news-card img { 
            width: 120px; 
            height: 80px; 
            object-fit: cover; 
            border-radius: 6px; 
        }
        .news-card-content h3 { 
            margin: 0 0 5px 0; 
            font-size: 16px; 
            line-height: 1.3; 
        }
        .news-card-content p { 
            margin: 0; 
            font-size: 13px; 
            color: #666; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Footer */
        footer { text-align: center; padding: 30px; color: #666; font-size: 14px; }
        footer a { color: #666; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="header-icon menu">☰</div>
        <a href="index.html" class="header-logo">9ja News</a>
        
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Search news...">
            <div class="header-icon search" id="search-btn">🔍</div>
        </div>
    </header>

    <!-- Trending Bar -->
    <div class="trending-bar">
        <marquee id="dynamic-ticker" behavior="scroll" direction="left" scrollamount="4">
            Loading latest updates...
        </marquee>
    </div>

    <!-- Main Content Area -->
    <main>
        <div class="ad-container">[ 728x90 Leaderboard Ad ]</div>

        <!-- DEFAULT HOMEPAGE VIEW -->
        <div id="home-view">
            <!-- Latest News Hero -->
            <div id="hero-target"></div>

            <!-- Auto-populated Sections -->
            <section id="LocalNews-section">
                <h2 id="LocalNews-head" style="display:none;">Local News</h2>
                <div class="feed-list" id="LocalNews-feed"></div>
            </section>

            <div class="ad-container">[ 300x250 In-Feed Ad ]</div>

            <section id="sport-section">
                <h2 id="sport-head" style="display:none;">Sports</h2>
                <div class="feed-list" id="sport-feed"></div>
            </section>
        </div>

        <!-- SEARCH RESULTS VIEW (Hidden initially) -->
        <div id="search-view" style="display: none;">
            <h2 id="search-title" style="margin-bottom: 20px;">Search Results</h2>
            <div class="feed-list" id="search-feed"></div>
        </div>
    </main>

    <footer>
        <nav>
            <a href="about/index.html">About</a> | 
            <a href="privacy-policy/index.html">Privacy Policy</a>
        </nav>
        <p>&copy; 2026 9ja News. All rights reserved.</p>
    </footer>

    <!-- The 9ja News Engine -->
    <script>
        let globalArticles = []; // Stores all fetched articles for the search engine

        async function fetchAndRender() {
            // Folders to scan
            const categories = ['sport', 'LocalNews'];
            
            for (const cat of categories) {
                try {
                    // CRITICAL: Ensure you have a list.json in each of these folders
                    // containing an array of your HTML filenames (e.g., ["news1.html", "news2.html"])
                    const listRes = await fetch(`./articles/${cat}/list.json`);
                    if (!listRes.ok) continue; // Skip if manifest is missing
                    
                    const files = await listRes.json();

                    for (const file of files) {
                        const articlePath = `./articles/${cat}/${file}`;
                        const res = await fetch(articlePath);
                        const html = await res.text();
                        
                        // Parse HTML to grab Metadata
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        
                        globalArticles.push({
                            title: doc.querySelector('title')?.innerText || "Latest News",
                            image: doc.querySelector('meta[property="og:image"]')?.content || "https://via.placeholder.com/1000x450?text=9ja+News",
                            excerpt: doc.querySelector('meta[name="description"]')?.content || "",
                            link: articlePath,
                            category: cat,
                            date: doc.querySelector('meta[property="article:published_time"]')?.content || "2000-01-01"
                        });
                    }
                } catch (e) {
                    console.warn(`Could not load category: ${cat}`, e);
                }
            }

            // Sort newest to oldest
            globalArticles.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (globalArticles.length === 0) {
                document.getElementById('dynamic-ticker').innerText = "System Ready: Upload articles to folders to populate home page.";
                return;
            }

            // 1. Render Ticker
            document.getElementById('dynamic-ticker').innerText = `LATEST: ${globalArticles[0].title}`;

            // 2. Render Hero
            document.getElementById('hero-target').innerHTML = `
                <article class="hero">
                    <a href="${globalArticles[0].link}" style="text-decoration:none; color:inherit;">
                        <img src="${globalArticles[0].image}" alt="Latest Update">
                        <h1>${globalArticles[0].title}</h1>
                        <p style="color:#666; font-size: 15px;">${globalArticles[0].excerpt}</p>
                    </a>
                </article>
            `;

            // 3. Render Feeds
            globalArticles.forEach((article, index) => {
                if (index === 0) return; // Skip Hero

                const card = createCardHTML(article);
                const feed = document.getElementById(`${article.category}-feed`);
                const head = document.getElementById(`${article.category}-head`);
                
                if (feed) {
                    feed.innerHTML += card;
                    head.style.display = 'block'; // Show category header if it has posts
                }
            });
        }

        // Helper to generate article cards
        function createCardHTML(article) {
            return `
                <div class="news-card">
                    <img src="${article.image}" alt="thumb">
                    <div class="news-card-content">
                        <a href="${article.link}" style="text-decoration:none; color:inherit;">
                            <h3>${article.title}</h3>
                            <p>${article.excerpt}</p>
                        </a>
                    </div>
                </div>`;
        }

        // --- SEARCH ENGINE LOGIC ---
        const searchBtn = document.getElementById('search-btn');
        const searchInput = document.getElementById('search-input');
        const homeView = document.getElementById('home-view');
        const searchView = document.getElementById('search-view');
        const searchFeed = document.getElementById('search-feed');
        const searchTitle = document.getElementById('search-title');

        searchBtn.addEventListener('click', () => {
            if (searchInput.style.display === 'none' || searchInput.style.display === '') {
                searchInput.style.display = 'block';
                searchInput.focus();
            } else {
                // Close and reset
                searchInput.style.display = 'none';
                searchInput.value = '';
                homeView.style.display = 'block';
                searchView.style.display = 'none';
            }
        });

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();

            if (query === '') {
                homeView.style.display = 'block';
                searchView.style.display = 'none';
                return;
            }

            homeView.style.display = 'none';
            searchView.style.display = 'block';

            // Filter array
            const results = globalArticles.filter(article => 
                article.title.toLowerCase().includes(query) || 
                article.excerpt.toLowerCase().includes(query)
            );

            searchTitle.innerText = `Search Results for "${query}" (${results.length})`;
            
            if (results.length === 0) {
                searchFeed.innerHTML = `<p style="padding: 20px; color: #666; font-style: italic;">No articles found matching your query.</p>`;
            } else {
                searchFeed.innerHTML = results.map(article => createCardHTML(article)).join('');
            }
        });

        // Initialize the site
        fetchAndRender();
    </script>
</body>
</html>
