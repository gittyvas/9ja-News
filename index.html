<!-- UPDATED TRENDING BAR -->
<div class="trending-bar">
    <marquee id="dynamic-ticker" behavior="scroll" direction="left" scrollamount="4">
        Loading latest updates...
    </marquee>
</div>

<main>
    <!-- TARGET FOR LATEST HERO -->
    <div id="hero-target"></div>

    <!-- TARGET FOR MAIN FEED -->
    <div id="feed-target" class="feed-list"></div>

    <!-- ... rest of your sections ... -->
</main>

<!-- ADD THIS SCRIPT BEFORE THE CLOSING </body> TAG -->
<script>
fetch('articles.json')
    .then(response => response.json())
    .then(articles => {
        const latest = articles[0];

        // 1. Update the Ticker with the latest title
        document.getElementById('dynamic-ticker').innerText = `LATEST: ${latest.title} | ${articles[1].title}...`;

        // 2. Build the Hero Section (Latest Article)
        document.getElementById('hero-target').innerHTML = `
            <article class="hero">
                <a href="${latest.link}" style="text-decoration:none; color:inherit;">
                    <img src="${latest.image}" alt="${latest.title}" loading="lazy">
                    <h1>${latest.title}</h1>
                </a>
            </article>
        `;

        // 3. Build the News Feed (Everything except the first one)
        let feedHtml = '';
        articles.slice(1).forEach(post => {
            feedHtml += `
                <div class="news-card">
                    <img src="${post.image}" alt="thumb" loading="lazy">
                    <div class="news-card-content">
                        <a href="${post.link}" style="text-decoration:none; color:inherit;">
                            <h3>${post.title}</h3>
                            <p>${post.excerpt}</p>
                        </a>
                    </div>
                </div>
            `;
        });
        document.getElementById('feed-target').innerHTML = feedHtml;
    })
    .catch(error => console.error('Error loading articles:', error));
</script>
